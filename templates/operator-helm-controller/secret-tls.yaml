---
apiVersion: v1
kind: Secret
metadata:
  name: operator-helm-controller-tls
  namespace: d8-{{ .Chart.Name }}
  {{- include "helm_lib_module_labels" (list . (dict "app" "operator-helm-controller")) | nindent 2 }}
type: kubernetes.io/tls
data:
  ca.crt: {{ .Values.operatorHelm.internal.controller.cert.ca | b64enc }}
  tls.crt: {{ .Values.operatorHelm.internal.controller.cert.crt | b64enc }}
  tls.key: {{ .Values.operatorHelm.internal.controller.cert.key | b64enc }}
