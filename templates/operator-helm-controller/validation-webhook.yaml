apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  {{- include "helm_lib_module_labels" (list . (dict "app" "operator-helm-controller")) | nindent 2 }}
  name: "operator-helm-controller-admission-webhook"
webhooks:
  - name: "helmclusteraddons.operator-helm-controller.validate.d8-operator-helm"
    rules:
      - apiGroups:   ["helm.deckhouse.io"]
        apiVersions: ["v1alpha1"]
        operations:  ["CREATE", "UPDATE"]
        resources:   ["helmclusteraddons"]
        scope:       "Cluster"
    clientConfig:
      service:
        namespace: d8-{{ .Chart.Name }}
        name: operator-helm-controller
        path: /validate-helm-deckhouse-io-v1alpha1-helmclusteraddon
        port: 443
      caBundle: |
        {{ .Values.operatorHelm.internal.controller.cert.ca | b64enc }}
    admissionReviewVersions: ["v1"]
    sideEffects: None
