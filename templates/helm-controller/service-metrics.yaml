---
apiVersion: v1
kind: Service
metadata:
  name: helm-controller-metrics
  namespace: d8-{{ .Chart.Name }}
  {{- include "helm_lib_module_labels" (list . (dict "app" "helm-controller")) | nindent 2 }}
spec:
  ports:
    - name: metrics
      port: 8080
      protocol: TCP
      targetPort: https-metrics
  selector:
    app: helm-controller
