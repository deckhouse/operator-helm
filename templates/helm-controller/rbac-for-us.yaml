---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: helm-controller
  namespace: d8-{{ .Chart.Name }}
  {{- include "helm_lib_module_labels" (list . (dict "app" "helm-controller")) | nindent 2 }}
imagePullSecrets:
- name: operator-helm-module-registry
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  {{- include "helm_lib_module_labels" (list .) | nindent 2 }}
  name: d8:{{ .Chart.Name }}:helm-controller
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: d8:{{ .Chart.Name }}:helm-controller
subjects:
- kind: ServiceAccount
  name: helm-controller
  namespace: d8-{{ .Chart.Name }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  {{- include "helm_lib_module_labels" (list .) | nindent 2 }}
  name: d8:{{ .Chart.Name }}:helm-controller
rules:
- apiGroups: ['*']
  resources: ['*']
  verbs: ['*']
- nonResourceURLs: ['*']
  verbs: ['*']
- apiGroups:
  - ""
  resources:
  - events
  verbs:
  - create
  - patch
- apiGroups:
  - helm.internal.operator-helm.deckhouse.io
  resources:
  - internalnelmoperatorhelmreleases
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - helm.internal.operator-helm.deckhouse.io
  resources:
  - internalnelmoperatorhelmreleases/finalizers
  verbs:
  - create
  - delete
  - get
  - patch
  - update
- apiGroups:
  - helm.internal.operator-helm.deckhouse.io
  resources:
  - internalnelmoperatorhelmreleases/status
  verbs:
  - get
  - patch
  - update
- apiGroups:
  - source.internal.operator-helm.deckhouse.io
  resources:
  - internalnelmoperatorhelmcharts
  - internalnelmoperatorocirepositories
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - source.internal.operator-helm.deckhouse.io
  resources:
  - internalnelmoperatorhelmcharts/status
  - internalnelmoperatorocirepositories/status
  verbs:
  - get
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  {{- include "helm_lib_module_labels" (list .) | nindent 2 }}
  name: helm-controller
  namespace: d8-{{ .Chart.Name }}
rules:
- apiGroups:
  - ""
  resources:
  - configmaps
  verbs:
  - get
  - list
  - watch
  - create
  - update
  - patch
  - delete
- apiGroups:
  - ""
  resources:
  - configmaps/status
  verbs:
  - get
  - update
  - patch
- apiGroups:
  - ""
  resources:
  - events
  verbs:
  - create
- apiGroups:
  - "coordination.k8s.io"
  resources:
  - leases
  verbs:
  - get
  - list
  - watch
  - create
  - update
  - patch
  - delete
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  {{- include "helm_lib_module_labels" (list .) | nindent 2 }}
  name: helm-controller
  namespace: d8-{{ .Chart.Name }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: helm-controller
subjects:
- kind: ServiceAccount
  name: helm-controller
