---
apiVersion: v1
kind: Service
metadata:
  name: nelm-source-controller
  namespace: d8-{{ .Chart.Name }}
  {{- include "helm_lib_module_labels" (list . (dict "app" "nelm-source-controller")) | nindent 2 }}
spec:
  ports:
    - name: controller
      port: 80
      targetPort: controller
      protocol: TCP
  selector:
    app: nelm-source-controller
