---
image: {{ .ModuleNamePrefix }}{{ .ImageName }}
fromImage: base/distroless
git:
  {{- include "image mount points" . }}
import:
- image: {{ .ModuleNamePrefix }}operator-helm-artifact
  add: /out/operator-helm-controller
  to: /app/operator-helm-controller
  after: install
imageSpec:
  config:
    workingDir: "/app"
    entrypoint: ["/app/operator-helm-controller"]
